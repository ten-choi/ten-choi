<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ten-choi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 640px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #30363d;
      margin-bottom: 1.5rem;
      object-fit: cover;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .username {
      color: #8b949e;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .bio {
      color: #c9d1d9;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      display: block;
      padding: 0.85rem 1.5rem;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #e6edf3;
      text-decoration: none;
      font-size: 0.95rem;
      transition: background 0.2s, border-color 0.2s;
    }

    .links a:hover {
      background: #161b22;
      border-color: #58a6ff;
    }

    .links a svg {
      width: 18px;
      height: 18px;
      vertical-align: middle;
      margin-right: 0.5rem;
      fill: #8b949e;
    }

    footer {
      margin-top: 3rem;
      color: #484f58;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      class="avatar"
      src="https://github.com/ten-choi.png"
      alt="ten-choi avatar"
    />
    <h1>ten-choi</h1>
    <p class="username">@ten-choi</p>
    <p class="bio">
      Welcome to my page.
    </p>
